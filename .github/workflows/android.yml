name: Build K1-Platform Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android, armv7-linux-androideabi

      - name: Install cargo-apk2
        run: cargo install cargo-apk2

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: r26b

      - name: Build APK
        run: |
          export ANDROID_NDK_HOME=$ANDROID_NDK_LATEST_HOME
          cd crates/k1-android
          cargo apk2 build --release
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_LATEST_HOME }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: k1-platform-apk
          path: crates/k1-android/target/release/apk/*.apk
