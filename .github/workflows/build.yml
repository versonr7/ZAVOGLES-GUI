name: Build Android (cargo-apk2)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-linux-android
          components: rust-src

      - name: Cache cargo-apk2 binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-apk2
          key: ${{ runner.os }}-cargo-apk2-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-apk2-

      - name: Install cargo-apk2
        run: cargo install cargo-apk2

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          link-to-sdk: true

      - name: Build Debug APK
        run: cargo apk2 build -p k1-app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: k1-debug-apk
          path: target/debug/apk/*.apk
