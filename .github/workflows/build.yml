name: Build Android (xbuild)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install xbuild
        run: cargo install xbuild

      - name: Build APK (Debug)
        run: x build --platform android --arch arm64 -p k1-app

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: k1-xbuild-apk
          path: target/x/debug/android/**/*.apk
